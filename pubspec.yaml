name: scentscribe
description: A lifestyle perfume journaling app with AI-powered scent recommendations, weather awareness, personal collection tracking, and fragrance analytics.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  dio: ^5.7.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^18.0.1
  geolocator: ^13.0.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.5
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sqflite: ^2.4.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
